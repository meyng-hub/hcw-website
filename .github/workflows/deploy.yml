name: CI

# Deployment ownership decision (2026-07-19):
# Vercel's Git integration is the ONLY deploy path for this repo — it
# builds and deploys every push to main (production) and every PR branch
# (preview) on its own.
#
# This workflow is CHECKS-ONLY. It previously also ran
# `vercel deploy --prod`, which produced a SECOND production deployment
# per push that raced the Git-integration deployment for the h-cw.org
# alias. Do not add Vercel CLI deploy steps back here — if deploy gating
# is ever needed, disable the Git integration first so there is exactly
# one deployer.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit
